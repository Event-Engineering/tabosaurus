<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      user-select: none;
    }

    .icon { opacity: 0.2; margin-bottom: 8px; }

    .title {
      font-size: 22px;
      font-weight: 600;
      color: #e6edf3;
    }

    .url {
      font-size: 13px;
      color: #8b949e;
      font-family: monospace;
      max-width: 640px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .error-code {
      font-size: 12px;
      color: #484f58;
    }

    button {
      margin-top: 8px;
      padding: 9px 22px;
      background: rgba(157, 119, 245, 0.12);
      border: 1px solid rgba(157, 119, 245, 0.35);
      color: #9d77f5;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: rgba(157, 119, 245, 0.22);
    }
  </style>
</head>
<body>
  <svg class="icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#e6edf3" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"></circle>
    <line x1="2" y1="12" x2="22" y2="12"></line>
    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
    <line x1="12" y1="2" x2="12" y2="2.01" stroke-width="3"></line>
  </svg>
  <div class="title">Page couldn't load</div>
  <div class="url" id="url"></div>
  <div class="error-code" id="error-code"></div>
  <button onclick="retry()">Try Again</button>
  <script>
    const params = new URLSearchParams(location.search)
    const url = params.get('url') || ''
    const error = params.get('error') || ''

    const urlEl = document.getElementById('url')
    urlEl.textContent = url
    urlEl.title = url

    const errorEl = document.getElementById('error-code')
    if (error) errorEl.textContent = error

    function retry() {
      if (url) location.href = url
    }
  </script>
</body>
</html>
