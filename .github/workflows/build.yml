name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Enable Developer Mode (Windows symlinks required by electron-builder)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-ItemProperty `
            -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" `
            -Name AllowDevelopmentWithoutDevLicense `
            -Value 1 -PropertyType DWORD -Force

      - name: Build
        run: npm run package:${{ matrix.platform }}
        env:
          # Prevents electron-builder from failing when no signing cert is present.
          # To enable signed builds, add CSC_LINK and CSC_KEY_PASSWORD as repository secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ""

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Tabosaurus ${{ github.ref_name }}" \
            --generate-notes \
            dist/*
